<body>

<h1>🎯 Guess The Number</h1>

<div id="startScreen">

<p>Enter your name to start</p>

<input type="text" id="playerName" placeholder="Your Name">

<br>

<button onclick="startGame()">Start Game</button>

</div>


<div id="gameSection">

<p>I picked a number between <b>1 and 100</b></p>

<input type="number" id="guess">

<br>

<button id="guessBtn"
  onclick="checkGuess()">Guess</button>

<button onclick="restartGame()">Play Again</button>

<p id="result"></p>

<p id="attempts"></p>

</div>


<h2>🏆 Leaderboard</h2>

<table>

<thead>
<tr>

</tr>

</tbody>

<script>

let gameEnded = false;
let alreadySaved = false;  
let secretNumber;
let attempts=0;
let player="";


function startGame(){

player=document.getElementById("playerName").value;

if(player===""){
alert("Enter your name first");
return;
}

secretNumber=Math.floor(Math.random()*100)+1;
attempts=0;

document.getElementById("startScreen").style.display="none";
document.getElementById("gameSection").style.display="block";

}


function checkGuess(){

if (gameEnded) {
  return; // 🚫 stop everything if game is over
  }
  
let guess=Number(document.getElementById("guess").value);

attempts++;

document.getElementById("attempts").innerHTML=
"Guesses: "+attempts;

if(guess===secretNumber){

document.getElementById("result").innerHTML=
"🎉 Correct! You guessed in "+attempts+" tries.";

gameEnded= true; 
saveScore(player,attempts);
loadLeaderboard();
  

document.getElementById("guess").disabled = true;
document.getElementById("guessBtn").disabled = true;

}

else if(guess>secretNumber){

document.getElementById("result").innerHTML=
"📉 Too High!";

}

else{

document.getElementById("result").innerHTML=
"📈 Too Low!";

}

}



function restartGame(){

gameEnded = false;
alreadySaved = false;

secretNumber=Math.floor(Math.random()*100)+1;

attempts=0;

document.getElementById("result").innerHTML="";

document.getElementById("attempts").innerHTML="";

document.getElementById("guess").value="";
document.getElementById("guess").disabled = false;
document.getElementById("guessBtn").disabled = false;

}



loadLeaderboard();

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBvi3sjhor_oXGfGBSkvVNvYlw_LyS1WNg",
  authDomain: "guess-the-number-dff1a.firebaseapp.com",
  projectId: "guess-the-number-dff1a",
  storageBucket: "guess-the-number-dff1a.firebasestorage.app",
  messagingSenderId: "916063551568",
  appId: "1:916063551568:web:0ca98ce755b93086f11155"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 SAVE SCORE (GLOBAL)
window.saveScore = async function(name, score){
  try{
    await addDoc(collection(db, "leaderboard"), {
      name: name,
      score: score
    });
    console.log("Score saved!");
  }catch(e){
    console.error("Error saving score:", e);
  }
}

// 🔥 LOAD LEADERBOARD
window.loadLeaderboard = function(){

  const q = query(collection(db,"leaderboard"), orderBy("score"), limit(10));

  onSnapshot(q, (snapshot)=>{

    const board = document.getElementById("leaderboard");
    board.innerHTML = "";

    let rank = 1;

    snapshot.forEach((doc)=>{
      const data = doc.data();

      let medal = "";

      if(rank === 1) medal = "🥇";
      else if(rank === 2) medal = "🥈";
      else if(rank === 3) medal = "🥉";

      board.innerHTML += `
        <tr class="${rank === 1 ? 'top-player' : ''}">
          <td>${medal} #${rank}</td>
          <td>${data.name}</td>
          <td>${data.score}</td>
        </tr>
      `;

      rank++;
    });

  });

  }

// Load leaderboard on start
window.onload = function(){
  loadLeaderboard();
}

</script>
